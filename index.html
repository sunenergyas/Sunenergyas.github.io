<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sun Energy AS — fotowoltaika bez dotacji</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:#111017; --ink-soft:#3a354b; --paper:#f6f2ea; --sun:#ffd35a;
      --mint:#6be4b1; --sky:#b7d8ff; --plum:#2b203f; --rose:#f2b4a0; --white:#fff;
      --shadow:0 20px 50px rgba(17,16,23,.12);
    }
    *{box-sizing:border-box}
    body{
      margin:0;font-family:"Space Grotesk",sans-serif;color:var(--ink);
      background:radial-gradient(1200px 500px at 10% -10%,#fff3c6 0%,transparent 60%),
                 radial-gradient(900px 600px at 100% 0%,#d9f3ff 0%,transparent 60%),var(--paper);
      min-height:100vh;
    }
    .bg-shapes{position:fixed;inset:0;background:
      radial-gradient(300px 300px at 15% 80%,rgba(107,228,177,.25),transparent 70%),
      radial-gradient(260px 260px at 85% 70%,rgba(242,180,160,.25),transparent 70%),
      radial-gradient(200px 200px at 65% 15%,rgba(183,216,255,.35),transparent 70%);
      pointer-events:none;z-index:0;}
    .nav{
      position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;
      padding:18px 6vw;backdrop-filter:blur(12px);background:rgba(246,242,234,.8);
      border-bottom:1px solid rgba(17,16,23,.08);
    }
    .brand svg{height:42px;display:block}
    .nav-links{display:flex;gap:22px;font-weight:500}
    .nav-links a{text-decoration:none;color:var(--ink-soft)}
    .nav-links a:hover{color:var(--ink)}
    main{position:relative;z-index:1}
    .hero{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:40px;align-items:center;padding:80px 6vw 60px;animation:rise .9s ease both}
    .eyebrow{text-transform:uppercase;letter-spacing:.2em;font-size:12px;color:var(--plum);font-weight:600}
    h1{font-family:"Fraunces",serif;font-size:clamp(34px,4vw,56px);line-height:1.05;margin:12px 0 18px}
    .lead{font-size:18px;color:var(--ink-soft);line-height:1.6}
    .hero-cta{margin:28px 0 18px;display:flex;gap:16px;flex-wrap:wrap}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;padding:14px 24px;border-radius:999px;
      border:none;text-decoration:none;font-weight:600;color:var(--ink);background:var(--sun);
      box-shadow:var(--shadow);transition:transform .2s ease,box-shadow .2s ease;
    }
    .btn:hover{transform:translateY(-2px);box-shadow:0 25px 55px rgba(17,16,23,.18)}
    .btn-ghost{background:transparent;border:1px solid rgba(17,16,23,.2);box-shadow:none}
    .btn-small{padding:10px 18px;font-size:14px}
    .hero-tags{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
    .hero-tags span{background:rgba(17,16,23,.06);padding:8px 14px;border-radius:999px;font-size:12px}
    .hero-card{background:var(--white);border-radius:24px;padding:28px;box-shadow:var(--shadow);
      border:1px solid rgba(17,16,23,.08);animation:floatIn .8s ease;}
    .card-header{font-weight:600;margin-bottom:18px}
    .metric{margin-bottom:16px}
    .metric-label{font-size:12px;text-transform:uppercase;letter-spacing:.15em;color:var(--ink-soft)}
    .metric-value{font-size:26px;font-weight:700;display:flex;flex-direction:column}
    .metric-value span{font-size:12px;color:var(--ink-soft);font-weight:500}
    .card-note{margin-top:14px;font-size:13px;color:var(--ink-soft)}
    .section{padding:70px 6vw;animation:fadeUp .9s ease both}
    .section-title{max-width:700px}
    .section-title h2{font-family:"Fraunces",serif;font-size:clamp(28px,3vw,40px);margin:12px 0 16px}
    .grid{display:grid;gap:22px;margin-top:28px}
    .grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
    .tile{background:var(--white);padding:24px;border-radius:20px;border:1px solid rgba(17,16,23,.08);
      box-shadow:var(--shadow);transition:transform .25s ease,box-shadow .25s ease;}
    .tile:hover{transform:translateY(-4px);box-shadow:0 24px 55px rgba(17,16,23,.16)}
    .split{display:grid;grid-template-columns:1.1fr .9fr;gap:40px;align-items:center}
    .list{padding-left:18px;margin:20px 0 0;color:var(--ink-soft)}
    .panel{background:var(--plum);color:var(--white);padding:28px;border-radius:24px;box-shadow:var(--shadow);animation:floatIn 1s ease both}
    .panel-row{display:flex;justify-content:space-between;margin-top:12px}
    .panel-bar{height:10px;background:rgba(255,255,255,.15);border-radius:999px;overflow:hidden;margin:10px 0 6px}
    .bar{height:100%;border-radius:inherit;animation:grow 1.2s ease forwards}
    .bar-solar{width:100%;background:var(--sun)}
    .bar-home{width:70%;background:var(--mint)}
    .bar-battery{width:35%;background:#f4a0ff}
    .panel-note{margin-top:16px;font-size:12px;color:rgba(255,255,255,.7)}
    .highlight{background:linear-gradient(120deg,rgba(255,211,90,.25),rgba(107,228,177,.2));
      border-top:1px solid rgba(17,16,23,.08);border-bottom:1px solid rgba(17,16,23,.08)}
    .steps{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:20px;margin-top:24px}
    .step{background:var(--white);border-radius:18px;padding:22px;box-shadow:var(--shadow);animation:fadeUp .9s ease both}
    .step span{display:inline-flex;width:36px;height:36px;border-radius:50%;align-items:center;justify-content:center;background:var(--sun);font-weight:700;margin-bottom:10px}
    .faq .tile{background:#fffdf8}
    .cta{display:grid;grid-template-columns:1.1fr .9fr;gap:40px;align-items:center;background:var(--ink);color:var(--white);
      border-radius:28px;margin:0 6vw 70px;padding:50px;animation:rise 1s ease both}
    .form{display:grid;gap:14px}
    .form label{display:grid;gap:6px;font-size:13px;color:rgba(255,255,255,.8)}
    .form input{padding:12px 14px;border-radius:12px;border:none;font-size:15px}
    .form-note{font-size:12px;color:rgba(255,255,255,.7)}
    .form-links{display:flex;flex-direction:column;gap:6px;font-size:13px}
    .form-links a{color:rgba(255,255,255,.8);text-decoration:none}
    .form-links a:hover{color:var(--sun)}
    .footer{display:flex;justify-content:space-between;align-items:center;padding:24px 6vw 40px;color:var(--ink-soft)}
    .footer-links{display:flex;gap:16px;font-size:14px}
    .footer-links a{color:var(--ink-soft);text-decoration:none}
    .footer-links a:hover{color:var(--ink)}
    .icon-link{display:inline-flex;align-items:center;gap:8px}
    .icon-link svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
    @keyframes floatIn{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes fadeUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes rise{from{transform:translateY(26px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes grow{from{width:0}}
    @media (max-width:980px){
      .nav-links{display:none}
      .hero,.split,.cta{grid-template-columns:1fr}
      .grid.two,.grid.three,.steps{grid-template-columns:1fr}
      .cta{margin:0 6vw 50px}
    }
    @media (max-width:640px){
      .nav{padding:14px 5vw}
      .hero{padding:60px 5vw 40px;gap:28px}
      .hero-text{order:2}
      .hero-card{order:1;padding:22px}
      h1{font-size:clamp(30px,9vw,40px)}
      .lead{font-size:16px}
      .section{padding:50px 5vw}
      .cta{padding:36px}
      .footer{flex-direction:column;gap:16px}
      .btn{width:100%}
      .hero-cta{width:100%}
      .hero-tags span{font-size:11px}
    }
  </style>
</head>
<body>
  <div class="bg-shapes" aria-hidden="true"></div>

  <header class="nav">
    <div class="brand">
      <svg width="260" height="60" viewBox="0 0 260 60" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sun Energy AS logo">
        <rect x="0" y="0" width="60" height="60" rx="14" fill="#111017"/>
        <circle cx="30" cy="28" r="10" fill="#FFD35A"/>
        <g stroke="#FFD35A" stroke-width="2" stroke-linecap="round">
          <line x1="30" y1="8" x2="30" y2="3"/>
          <line x1="30" y1="53" x2="30" y2="48"/>
          <line x1="10" y1="28" x2="5" y2="28"/>
          <line x1="55" y1="28" x2="50" y2="28"/>
          <line x1="16" y1="14" x2="12" y2="10"/>
          <line x1="44" y1="46" x2="48" y2="50"/>
          <line x1="44" y1="14" x2="48" y2="10"/>
          <line x1="16" y1="46" x2="12" y2="50"/>
        </g>
        <rect x="12" y="34" width="36" height="14" rx="4" fill="#1E1B2A" stroke="#3E3558"/>
        <g stroke="#6BE4B1" stroke-width="1.5">
          <line x1="16" y1="38" x2="44" y2="38"/>
          <line x1="16" y1="42" x2="44" y2="42"/>
        </g>
        <text x="76" y="36" font-family="'Space Grotesk', sans-serif" font-size="22" font-weight="700" fill="#111017">Sun Energy AS</text>
        <text x="76" y="52" font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="500" fill="#6A6A7A">EMS • Magazyn • Rachunki</text>
      </svg>
    </div>
    <nav class="nav-links">
      <a href="#dlaczego">Dlaczego teraz</a>
      <a href="#ems">EMS i magazyn</a>
      <a href="#rachunki">Rachunki</a>
      <a href="#kontakt">Kontakt</a>
    </nav>
    <a class="btn btn-small" href="#kontakt">Zamów audyt</a>
  </header>

  <main>
    <!-- reszta treści zostaje taka sama jak wcześniej -->
    <!-- jeśli chcesz, mogę dodać pełną treść w kolejnej wiadomości -->
  </main>
</body>
</html>
