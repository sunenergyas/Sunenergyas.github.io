<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optymalizacja Energii</title>
    <!-- CZCIONKA -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<body>

    <header class="hero">
        <div class="hero-box">
            <h1>Fotowoltaika bez dotacji ma sens</h1>

            <a href="mailto:kontakt@optymalizacjaenergii.org" class="btn">Darmowa Analiza</a>
        </div>
    </header>

    <section class="container">
        <div class="grid">
            <div class="text-box">
                <h2>Silna Autokonsumpcja</h2>
                <p>Optymalizujemy systemy tak, abyś zużywał energię u siebie.</p>
            </div>
            <div class="image-box img-autokonsumpcja"></div>
        </div>
    </section>

    <section class="ems-dark">
        <div class="container">
            <h2>Inteligentny System EMS</h2>
            <div class="stats">
                <div class="stat-card"><h3>100%</h3><p>Zysku</p></div>
                <div class="stat-card"><h3>80%</h3><p>Niezależności</p></div>
            </div>
        </div>
