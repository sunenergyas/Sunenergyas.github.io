<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sun Energy AS — fotowoltaika bez dotacji</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #111017;
      --ink-soft: #3a354b;
      --paper: #f6f2ea;
      --sun: #ffd35a;
      --mint: #6be4b1;
      --plum: #2b203f;
      --white: #ffffff;
      --shadow: 0 20px 50px rgba(17, 16, 23, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      color: var(--ink);
      background: radial-gradient(1200px 500px at 10% -10%, #fff3c6 0%, transparent 60%),
        radial-gradient(900px 600px at 100% 0%, #d9f3ff 0%, transparent 60%),
        var(--paper);
      min-height: 100vh;
    }
    .bg-shapes {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(300px 300px at 15% 80%, rgba(107, 228, 177, 0.25), transparent 70%),
        radial-gradient(260px 260px at 85% 70%, rgba(242, 180, 160, 0.25), transparent 70%),
        radial-gradient(200px 200px at 65% 15%, rgba(183, 216, 255, 0.35), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .nav {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 6vw;
      backdrop-filter: blur(12px);
      background: rgba(246, 242, 234, 0.8);
      border-bottom: 1px solid rgba(17, 16, 23, 0.08);
    }
    .brand svg { height: 42px; display: block; }
    .nav-links { display: flex; gap: 22px; font-weight: 500; }
    .nav-links a { text-decoration: none; color: var(--ink-soft); }
    .nav-links a:hover { color: var(--ink); }
    main { position: relative; z-index: 1; }
    .hero {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 40px;
      align-items: center;
      padding: 80px 6vw 60px;
      animation: rise 0.9s ease both;
    }
    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 12px;
      color: var(--plum);
      font-weight: 600;
    }
    h1 {
      font-family: "Fraunces", serif;
      font-size: clamp(34px, 4vw, 56px);
      line-height: 1.05;
      margin: 12px 0 18px;
    }
    .lead { font-size: 18px; color: var(--ink-soft); line-height: 1.6; }
    .hero-cta { margin: 28px 0 18px; display: flex; gap: 16px; flex-wrap: wrap; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 24px;
      border-radius: 999px;
      border: none;
      text-decoration: none;
      font-weight: 600;
      color: var(--ink);
      background: var(--sun);
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 25px 55px rgba(17, 16, 23, 0.18); }
    .btn-ghost { background: transparent; border: 1px solid rgba(17, 16, 23, 0.2); box-shadow: none; }
    .btn-small { padding: 10px 18px; font-size: 14px; }
    .hero-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
    .hero-tags span { background: rgba(17, 16, 23, 0.06); padding: 8px 14px; border-radius: 999px; font-size: 12px; }
    .hero-card {
      background: var(--white);
      border-radius: 24px;
      padding: 28px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(17, 16, 23, 0.08);
      animation: floatIn 0.8s ease;
    }
    .card-header { font-weight: 600; margin-bottom: 18px; }
    .metric { margin-bottom: 16px; }
    .metric-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--ink-soft); }
    .metric-value { font-size: 26px; font-weight: 700; display: flex; flex-direction: column; }
    .metric-value span { font-size: 12px; color: var(--ink-soft); font-weight: 500; }
    .card-note { margin-top: 14px; font-size: 13px; color: var(--ink-soft); }
    .section { padding: 70px 6vw; animation: fadeUp 0.9s ease both; }
    .section-title { max-width: 700px; }
    .section-title h2 { font-family: "Fraunces", serif; font-size: clamp(28px, 3vw, 40px); margin: 12px 0 16px; }
    .grid { display: grid; gap: 22px; margin-top: 28px; }
    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .tile {
      background: var(--white);
      padding: 24px;
      border-radius: 20px;
      border: 1px solid rgba(17, 16, 23, 0.08);
      box-shadow: var(--shadow);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .tile:hover { transform: translateY(-4px); box-shadow: 0 24px 55px rgba(17, 16, 23, 0.16); }
    .split { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 40px; align-items: center; }
    .list { padding-left: 18px; margin: 20px 0 0; color: var(--ink-soft); }
    .panel {
      background: var(--plum);
      color: var(--white);
      padding: 28px;
      border-radius: 24px;
      box-shadow: var(--shadow);
      animation: floatIn 1s ease both;
    }
    .panel-row { display: flex; justify-content: space-between; margin-top: 12px; }
    .panel-bar { height: 10px; background: rgba(255,255,255,0.15); border-radius: 999px; overflow: hidden; margin: 10px 0 6px; }
    .bar { height: 100%; border-radius: inherit; animation: grow 1.2s ease forwards; }
    .bar-solar { width: 100%; background: var(--sun); }
    .bar-home { width: 70%; background: var(--mint); }
    .bar-battery { width: 35%; background: #f4a0ff; }
    .panel-note { margin-top: 16px; font-size: 12px; color: rgba(255,255,255,0.7); }
    .highlight {
      background: linear-gradient(120deg, rgba(255,211,90,0.25), rgba(107,228,177,0.2));
      border-top: 1px solid rgba(17,16,23,0.08);
      border-bottom: 1px solid rgba(17,16,23,0.08);
    }
    .steps { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 20px; margin-top: 24px; }
    .step { background: var(--white); border-radius: 18px; padding: 22px; box-shadow: var(--shadow); animation: fadeUp 0.9s ease both; }
    .step span {
      display: inline-flex; width: 36px; height: 36px; border-radius: 50%;
      align-items: center; justify-content: center; background: var(--sun);
      font-weight: 700; margin-bottom: 10px;
    }
    .cta {
      display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 40px; align-items: center;
      background: var(--ink); color: var(--white); border-radius: 28px; margin: 0 6vw 70px; padding: 50px;
      animation: rise 1s ease both;
    }
    .form { display: grid; gap: 14px; }
    .form label { display: grid; gap: 6px; font-size: 13px; color: rgba(255,255,255,0.8); }
    .form input { padding: 12px 14px; border-radius: 12px; border: none; font-size: 15px; }
    .form-note { font-size: 12px; color: rgba(255,255,255,0.7); }
    .form-links { display: flex; flex-direction: column; gap: 6px; font-size: 13px; }
    .icon-link { display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
    .icon-link svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .form-links a { color: rgba(255,255,255,0.8); }
    .form-links a:hover { color: var(--sun); }
    .footer { display: flex; justify-content: space-between; align-items: center; padding: 24px 6vw 40px; color: var(--ink-soft); }
    .footer-links { display: flex; gap: 16px; font-size: 14px; }
    .footer-links a { color: var(--ink-soft); }
    .footer-links a:hover { color: var(--ink); }
    @keyframes floatIn { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeUp { from { transform: translateY(18px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
